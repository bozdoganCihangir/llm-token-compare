name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Sigstore provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify tag matches package.json
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package.json version $pkg"
            exit 1
          fi
      - name: Verify built CLI reports the package version
        run: |
          set -euo pipefail
          pkg=$(node -p "require('./package.json').version")
          cli=$(node dist/cli.js --version)
          if [[ "$cli" != *"$pkg"* ]]; then
            echo "::error::Built CLI reports '$cli', expected to contain '$pkg'"
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
